title: "Sistemas Embarcados — Lógica Digital com ESP32"
description: "Mini curso para o Curso Técnico em Automação Industrial. Do bit ao byte — operadores bitwise, máscaras, flags e UART com ESP32 e MicroPython."

theme: jekyll-theme-cayman

baseurl: "/minicurso_01-embarcados"
url: "https://rogeriomb-hub.github.io"

# Navegação entre páginas
header_pages:
  - index.md
  - aulas/aula01-leitura-escrita-digital.md
  - aulas/aula02-operadores-bitwise.md
  - aulas/aula03-listas-mascaras.md
  - aulas/aula03-extra-funcoes.md
  - aulas/aula04-deslocamento-escrita-porta.md
  - aulas/aula05-maquina-estados.md
  - aulas/aula06-flags-maquina-lavar.md
  - aulas/aula07-uart-primeiros-bytes.md
  - aulas/aula08-uart-nibbles.md

# Configurações gerais
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

rouge:
  wrap: true

exclude:
  - "*.zip"
  - COMO-PUBLICAR.md
  - GUIA-CONSTRUCAO.md
